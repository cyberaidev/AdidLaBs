          TAVILY_API_KEY: !Ref TavilyApiKey
          DEMO_MODE: !Ref DemoMode
      Code: !If
        - UseToolsS3Code
        - { S3Bucket: !Ref ArtifactsBucket, S3Key: !Ref ToolsCodeS3Key }
        - ZipFile: |
            """AdidLaBs MCP tools inline bootstrap (demo).

            A tiny health/echo handler so the tools function exists (and can
            receive KB_ID via env from deploy.sh) before the real mcp-tools
            server zip is staged. Production replaces this with mcp-tools/server.py.
            Concept demo — no affiliation with adidas AG. All products fictional.
            """
            import json, os

            _TOOLS = ["get_catalog", "get_deals", "bag_add", "bag_get",
                      "search_lab_knowledge", "search_web"]

            def handler(event, context=None):
                return {"statusCode": 200,
                        "headers": {"Content-Type": "application/json"},
                        "body": json.dumps({"status": "ok", "tools": _TOOLS,
                                            "kb_id": os.environ.get("KB_ID", ""),
                                            "region": "ap-southeast-2"})}
      Tags:
        - { Key: app, Value: adidlabs }

  # ===========================================================================
  # HTTP API + JWT authorizer (Cognito) + routes + integrations
  # ===========================================================================
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "adidlabs-http-api-${AWS::StackName}"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: [GET, POST, DELETE, OPTIONS]
        AllowHeaders: [Content-Type, Authorization]
        MaxAge: 3600

  JwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      AuthorizerType: JWT
      Name: adidlabs-cognito-jwt
      IdentitySource: ["$request.header.Authorization"]
      JwtConfiguration:
        Audience: [!Ref UserPoolClient]
        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"

  TerminalFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "adidlabs-api-terminal-${AWS::StackName}"
      Description: GET /api/terminal — AgentCore runtime session lines for the web terminal.
      Role: !GetAtt TerminalLambdaRole.Arn
      Runtime: python3.12
      Timeout: 15
      MemorySize: !Ref LambdaMemoryMb
      Handler: !If [UseApiS3Code, terminal.handler, index.handler]
      Code: !If
        - UseApiS3Code
        - { S3Bucket: !Ref ArtifactsBucket, S3Key: !Ref ApiCodeS3Key }
        - ZipFile: |
            import json

            def handler(event, context):
                return {
                    "statusCode": 200,
                    "headers": {"Content-Type": "application/json",
                                "Access-Control-Allow-Origin": "*"},
                    "body": json.dumps({
                        "log_group": None, "events": [],
                        "note": "Inline bootstrap — deploy the backend package "
                                "(ArtifactsBucket/ApiCodeS3Key) for live logs."}),
                }
      Tags:
        - { Key: app, Value: adidlabs }

  CatalogFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "adidlabs-api-catalog-${AWS::StackName}"
      Description: GET /api/catalog — full category listings for the browse drawers.
      Role: !GetAtt CatalogLambdaRole.Arn
      Runtime: python3.12
      Timeout: 10
      MemorySize: !Ref LambdaMemoryMb
      Handler: !If [UseApiS3Code, catalog.handler, index.handler]
      Environment:
        Variables:
          CATALOG_TABLE: !Ref CatalogTable
      Code: !If
        - UseApiS3Code
        - { S3Bucket: !Ref ArtifactsBucket, S3Key: !Ref ApiCodeS3Key }
        - ZipFile: |
            import json

            def handler(event, context):
                return {
                    "statusCode": 200,
                    "headers": {"Content-Type": "application/json",
                                "Access-Control-Allow-Origin": "*"},
                    "body": json.dumps({
                        "category": None, "count": 0, "currency": "USD",
                        "items": [],
                        "note": "Inline bootstrap — deploy the backend package "
                                "(ArtifactsBucket/ApiCodeS3Key) for the catalog."}),
                }
      Tags:
        - { Key: app, Value: adidlabs }

  TelemetryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "adidlabs-api-telemetry-${AWS::StackName}"
      Description: GET /api/telemetry — LiteLLM/Bedrock token usage for the storefront panel.
      Role: !GetAtt TelemetryLambdaRole.Arn
      Runtime: python3.12
      Timeout: 15
      MemorySize: !Ref LambdaMemoryMb
      Handler: !If [UseApiS3Code, telemetry.handler, index.handler]
      Code: !If
        - UseApiS3Code
        - { S3Bucket: !Ref ArtifactsBucket, S3Key: !Ref ApiCodeS3Key }
        - ZipFile: |
            import json

            def handler(event, context):
                return {
                    "statusCode": 200,
                    "headers": {"Content-Type": "application/json",
                                "Access-Control-Allow-Origin": "*"},
                    "body": json.dumps({
                        "models": [], "totals": {"invocations": 0, "tokens_in": 0,
                                                  "tokens_out": 0, "tokens": 0},
                        "note": "Inline bootstrap — deploy the backend package "
                                "(ArtifactsBucket/ApiCodeS3Key) for live telemetry."}),
                }
      Tags:
        - { Key: app, Value: adidlabs }

  # --- Integrations (one per function) --------------------------------------
  SessionIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt SessionFunction.Arn
      PayloadFormatVersion: "2.0"

  WeatherIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt WeatherFunction.Arn
      PayloadFormatVersion: "2.0"

  BagIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt BagFunction.Arn
      PayloadFormatVersion: "2.0"

  ChatIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ChatFunction.Arn
      PayloadFormatVersion: "2.0"

  AgentsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt AgentsFunction.Arn
      PayloadFormatVersion: "2.0"

  TerminalIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt TerminalFunction.Arn
      PayloadFormatVersion: "2.0"

  TelemetryIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt TelemetryFunction.Arn
      PayloadFormatVersion: "2.0"

  CatalogIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt CatalogFunction.Arn
      PayloadFormatVersion: "2.0"

  # --- Routes ----------------------------------------------------------------
  # session, weather, agents are pre-auth (session/weather/agents are fetched
  # right after login but the JWT authorizer is applied to bag + chat where
  # user_id from the token is load-bearing). session/weather/agents use no
  # authorizer so the locked/gate UI can render before login.
  SessionRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /api/session"
      Target: !Sub "integrations/${SessionIntegration}"

  WeatherRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /api/weather"
      Target: !Sub "integrations/${WeatherIntegration}"

  AgentsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /api/agents"
      Target: !Sub "integrations/${AgentsIntegration}"

  # telemetry — public like agents: aggregate demo usage numbers, no user data.
  TelemetryRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /api/telemetry"
      Target: !Sub "integrations/${TelemetryIntegration}"

  # catalog — public: fictional demo items for the browse drawers.
  CatalogRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /api/catalog"
      Target: !Sub "integrations/${CatalogIntegration}"

  # bag (all verbs) — JWT-protected; user_id is derived from the token sub.
  BagGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /api/bag"
      Target: !Sub "integrations/${BagIntegration}"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer

  BagPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /api/bag"
      Target: !Sub "integrations/${BagIntegration}"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer

  BagDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "DELETE /api/bag"
      Target: !Sub "integrations/${BagIntegration}"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer

  ChatRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /api/chat"
      Target: !Sub "integrations/${ChatIntegration}"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer

  # terminal — JWT-protected; runtime session logs are for signed-in members.
  TerminalRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /api/terminal"
      Target: !Sub "integrations/${TerminalIntegration}"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer

  # --- Stage (auto-deploy) ---------------------------------------------------
  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  # --- Lambda invoke permissions for API Gateway ----------------------------
  SessionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SessionFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/api/session"

  WeatherInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WeatherFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/api/weather"

  BagInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BagFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/api/bag"

  ChatInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChatFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/api/chat"

  AgentsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AgentsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/api/agents"

  TerminalInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TerminalFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/api/terminal"

  TelemetryInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TelemetryFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/api/telemetry"

  CatalogInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CatalogFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/api/catalog"

# -----------------------------------------------------------------------------
# Outputs — the five contractual outputs PLUS the ids deploy.sh / teardown.sh
# read (SiteBucketName, CloudFrontDistributionId, KbCorpusBucketName,
# KbRoleArn, ApiHandlerFunctionName, ToolsFunctionName, AgentRuntimeArn, KbId)
# and the alternate spellings the scripts use
# (CloudFrontUrl/ApiBaseUrl/LiteLLMUrl).
# AgentGatewayId is intentionally NOT exposed: the AgentCore gateway belongs to
# the sibling gateway module, and deploy.sh already falls back to GATEWAY_ID /
# a stable default when that output is absent.
# -----------------------------------------------------------------------------
Outputs:

  # --- The five required by the module contract ---
  CloudFrontURL:
    Description: Public site URL (raw CloudFront domain, no custom domain).
    Value: !Sub "https://${SiteDistribution.DomainName}"

  ApiUrl:
    Description: HTTP API base URL.
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  LiteLlmUrl:
    Description: LiteLLM Lambda function URL (AWS_IAM auth).
    Value: !GetAtt LiteLlmUrl.FunctionUrl

  UserPoolId:
    Description: Cognito user pool id.
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito app client id (SPA, no secret).
    Value: !Ref UserPoolClient

  # --- Alternate spellings consumed by deploy.sh / teardown.sh ---
  CloudFrontUrl:
    Description: Alias of CloudFrontURL for deploy.sh (cfn_output CloudFrontUrl).
    Value: !Sub "https://${SiteDistribution.DomainName}"

  ApiBaseUrl:
    Description: Alias of ApiUrl for deploy.sh (cfn_output ApiBaseUrl).
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  LiteLLMUrl:
    Description: Alias of LiteLlmUrl for deploy.sh (cfn_output LiteLLMUrl).
    Value: !GetAtt LiteLlmUrl.FunctionUrl

  # --- Ids the deploy/teardown scripts read for post-deploy steps ---
  SiteBucketName:
    Description: Private site bucket name (deploy.sh syncs frontend/dist here).
    Value: !Ref SiteBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution id (deploy.sh invalidates it).
    Value: !Ref SiteDistribution

  KbCorpusBucketName:
    Description: KB corpus bucket (seed_catalog.py / setup_kb.py write here).
    Value: !Ref KbCorpusBucket

  KbRoleArn:
    Description: >-
      Bedrock Knowledge Base service-role ARN. deploy.sh reads this
      (cfn_output KbRoleArn) and passes it to data/setup_kb.py as the role the
      KB assumes (Titan embed + corpus read + S3 Vectors). Clean cross-module
      handoff for the out-of-band (S3 Vectors preview) KB creation.
    Value: !GetAtt KbServiceRole.Arn

  ApiHandlerFunctionName:
    Description: Chat API function name (deploy.sh pushes KB_ID here).
    Value: !Ref ChatFunction

  ToolsFunctionName:
    Description: MCP tools function name (deploy.sh pushes KB_ID here).
    Value: !Ref ToolsFunction

  AgentRuntimeArn:
    Description: >-
      AgentCore Runtime ARN for /api/chat. Provisioned outside this template
      (agents module); echoes the AgentCoreAgentArn parameter (empty until set).
    Value: !Ref AgentCoreAgentArn

  KbId:
    Description: Bedrock Knowledge Base id (echoes KbId param; set by setup_kb.py).
    Value: !Ref KbId

  UserPoolProviderUrl:
    Description: Cognito issuer URL (JWT authorizer issuer / frontend config).
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"

  CatalogTableName:
    Description: DynamoDB catalog table name.
    Value: !Ref CatalogTableResource

  BagTableName:
    Description: DynamoDB bag table name.
    Value: !Ref BagTableResource
