    Properties:
      FunctionName: !Sub "adidlabs-tools-${AWS::StackName}"
      Description: MCP tools (catalog/deals/bag/knowledge/web) + FAISS KB fallback host.
      Role: !GetAtt ToolsLambdaRole.Arn
